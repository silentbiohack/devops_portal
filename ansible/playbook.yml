---
- name: Install Docker and prepare nodes
  hosts: swarm_nodes
  become: yes
  tasks:
    - name: Set hostname
      hostname:
        name: "{{ inventory_hostname }}"

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker Engine
      apt:
        name: docker.io
        state: present

    - name: Ensure Docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add devops user to docker group
      user:
        name: devops
        groups: docker
        append: yes

    - name: Open required firewall ports
      command: "ufw allow {{ item }}"
      loop:
        - "22/tcp"
        - "80/tcp"
        - "2377/tcp"
        - "7946/tcp"
        - "7946/udp"
        - "4789/udp"
        - "2049/tcp"
        - "111/tcp"
        - "111/udp"
      ignore_errors: yes

- name: Set up NFS server on manager (shared data storage)
  hosts: manager
  become: yes
  tasks:
    - name: Install NFS server
      apt:
        name: nfs-kernel-server
        state: present

    - name: Create shared data directory
      file:
        path: /mnt/devops-news-data
        state: directory
        mode: '0777'

    - name: Export shared data directory
      lineinfile:
        path: /etc/exports
        line: "/mnt/devops-news-data 192.168.10.0/24(rw,sync,no_subtree_check,no_root_squash)"
        create: yes

    - name: Apply NFS exports
      command: exportfs -ra

    - name: Ensure NFS server is running and enabled
      service:
        name: nfs-kernel-server
        state: restarted
        enabled: yes

- name: Mount shared data storage on workers
  hosts: workers
  become: yes
  tasks:
    - name: Install NFS client
      apt:
        name: nfs-common
        state: present

    - name: Create mount point
      file:
        path: /mnt/devops-news-data
        state: directory
        mode: '0777'

    - name: Mount NFS share from manager
      mount:
        path: /mnt/devops-news-data
        src: "{{ hostvars[groups['manager'][0]].ansible_host }}:/mnt/devops-news-data"
        fstype: nfs
        opts: rw,sync
        state: mounted

- name: Deploy application code and secrets to all nodes
  hosts: swarm_nodes
  become: yes
  tasks:
    - name: Ensure project directories exist
      file:
        path: "/home/devops/devops-project/{{ item }}"
        state: directory
        owner: devops
        group: devops
      loop:
        - app
        - docker

    - name: Copy application source
      copy:
        src: "{{ playbook_dir }}/../app/"
        dest: /home/devops/devops-project/app/
        owner: devops
        group: devops

    - name: Copy Dockerfile
      copy:
        src: "{{ playbook_dir }}/../docker/Dockerfile"
        dest: /home/devops/devops-project/docker/Dockerfile
        owner: devops
        group: devops

    - name: Copy stack.yml
      copy:
        src: "{{ playbook_dir }}/../stack.yml"
        dest: /home/devops/devops-project/stack.yml
        owner: devops
        group: devops

    - name: Ensure secrets directory exists
      file:
        path: /opt/devops-news
        state: directory
        owner: devops
        group: devops
        mode: '0700'

    - name: Deploy environment secrets file
      copy:
        src: /home/devops/secrets/.env
        dest: /opt/devops-news/.env
        owner: devops
        group: devops
        mode: '0600'

    - name: Build devops-news image
      command: docker build -t devops-news:latest -f docker/Dockerfile .
      args:
        chdir: /home/devops/devops-project

- name: Initialize Docker Swarm on manager
  hosts: manager
  become: yes
  tasks:
    - name: Initialize swarm
      command: "docker swarm init --advertise-addr {{ ansible_host }}"
      register: swarm_init
      failed_when: swarm_init.rc != 0 and 'already part of a swarm' not in swarm_init.stderr
      changed_when: swarm_init.rc == 0

    - name: Get worker join token
      command: docker swarm join-token -q worker
      register: worker_token
      changed_when: false

- name: Join workers to Swarm
  hosts: workers
  become: yes
  tasks:
    - name: Join swarm as worker
      command: >
        docker swarm join
        --token {{ hostvars[groups['manager'][0]].worker_token.stdout }}
        {{ hostvars[groups['manager'][0]].ansible_host }}:2377
      register: join_result
      failed_when: join_result.rc != 0 and 'already part of a swarm' not in join_result.stderr
      changed_when: join_result.rc == 0

- name: Deploy stack on manager
  hosts: manager
  become: yes
  tasks:
    - name: Remove previous demo stack if present
      command: docker stack rm webapp
      ignore_errors: yes

    - name: Wait for old stack network to be removed
      command: docker network prune -f
      ignore_errors: yes

    - name: Deploy news stack
      command: docker stack deploy -c /home/devops/devops-project/stack.yml news
      args:
        chdir: /home/devops/devops-project
