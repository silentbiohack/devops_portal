[manager]
swarm-manager ansible_host=192.168.10.21

[workers]
worker1 ansible_host=192.168.10.22
worker2 ansible_host=192.168.10.23

[swarm_nodes:children]
manager
workers

[all:vars]
ansible_user=devops
ansible_ssh_private_key_file=~/.ssh/devops_project
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
